<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070b19" />
      <stop offset="100%" stop-color="#02050f" />
    </linearGradient>

    <!-- Theme Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b224ef" />
      <stop offset="100%" stop-color="#7579ff" />
    </linearGradient>

    <!-- Glowing Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations for Dynamic Aspect */
    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
      100% { opacity: 0.3; transform: scale(1); }
    }
    @keyframes dash {
      to { stroke-dashoffset: -100; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    @keyframes rotateGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .grid-bg {
      stroke: #1e293b;
      stroke-width: 1;
      opacity: 0.25;
    }
    .pulsing-circle {
      animation: pulse 4s infinite ease-in-out;
      transform-origin: center;
    }
    .animated-line {
      stroke-dasharray: 10, 15;
      animation: dash 5s linear infinite;
    }
    .floating-text {
      animation: float 6s infinite ease-in-out;
      transform-origin: center;
    }
    .glow-effect {
      filter: url(#glow);
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid Pattern overlay -->
  <g class="grid-bg">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" />
  </g>

  <!-- Dynamic Glowing Shapes -->
  <circle cx="200" cy="100" r="150" fill="url(#glowGrad)" opacity="0.15" class="pulsing-circle" />
  <circle cx="1000" cy="300" r="120" fill="url(#primaryGrad)" opacity="0.1" class="pulsing-circle" style="animation-delay: -2s;" />

  <!-- Animated Circuit Path -->
  <g stroke="url(#primaryGrad)" stroke-width="2" fill="none" opacity="0.8">
    <path d="M-50,200 L400,200 L450,250 L750,250 L800,200 L1250,200" class="animated-line" />
    <path d="M150,0 L150,120 L200,170" />
    <path d="M1050,400 L1050,280 L1000,230" />
  </g>

  <!-- Graphic Elements (Robotic Joint Concept) -->
  <g transform="translate(600, 200)" class="floating-text">
    <!-- Outer Ring -->
    <circle r="90" fill="none" stroke="url(#primaryGrad)" stroke-width="2" stroke-dasharray="10 30" style="animation: rotateGlow 20s linear infinite; transform-origin: center;" />
    <!-- Inner Ring -->
    <circle r="70" fill="none" stroke="url(#glowGrad)" stroke-width="3" stroke-dasharray="80 40" style="animation: rotateGlow 12s linear infinite reverse; transform-origin: center;" />
    <!-- Center Node -->
    <circle r="20" fill="url(#primaryGrad)" class="glow-effect" />
  </g>

  <!-- Text and Titles -->
  <g text-anchor="middle" font-family="'Outfit', 'Inter', system-ui, sans-serif">
    <!-- Subtitle -->
    <text x="600" y="110" fill="#64748b" font-size="20" letter-spacing="8" font-weight="600">AWESOME PARADIGM</text>
    
    <!-- Main Title -->
    <text x="600" y="170" fill="url(#primaryGrad)" font-size="64" font-weight="800" letter-spacing="4" class="glow-effect">GENERAL PHYSICAL INTELLIGENCE</text>
    
    <!-- Tagline -->
    <text x="600" y="320" fill="#e2e8f0" font-size="18" letter-spacing="1">Evolving Foundation Models, Kinetics, and Sim-to-Real Control</text>
  </g>

  <!-- Node Dots -->
  <circle cx="400" cy="200" r="5" fill="#00f2fe" class="glow-effect" />
  <circle cx="450" cy="250" r="5" fill="#4facfe" class="glow-effect" />
  <circle cx="750" cy="250" r="5" fill="#7579ff" class="glow-effect" />
  <circle cx="800" cy="200" r="5" fill="#b224ef" class="glow-effect" />
</svg>
